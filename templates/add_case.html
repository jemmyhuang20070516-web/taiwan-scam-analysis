<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>新增詐騙案件</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 30px;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #cccccc;
            border-radius: 4px;
        }

        textarea {
            height: 180px;
            resize: vertical;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .back {
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>新增詐騙案件</h1>

    <form method="POST">

        <label for="title">案件標題</label>

        <input
            type="text"
            id="title"
            name="title"
            required
        >

        <label for="publish_date">發布日期</label>

        <input
            type="text"
            id="publish_date"
            name="publish_date"
            placeholder="例如：2026-07-10"
        >

        <label for="content">案件內容</label>

        <textarea
            id="content"
            name="content"
        ></textarea>

        <button type="submit">
            新增資料
        </button>

    </form>

    <a class="back" href="{{ url_for('cases') }}">
        回到案件列表
    </a>

</div>

</body>
</html>
